<svg viewBox="0 0 600 640" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Illustration of a phosphophyllite crystal cluster">
  <defs>
    <linearGradient id="hA" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8FE6D6"/><stop offset="100%" stop-color="#17A398"/>
    </linearGradient>
    <linearGradient id="hB" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#17A398"/><stop offset="100%" stop-color="#0A4B44"/>
    </linearGradient>
    <linearGradient id="hC" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#0A2E2B"/><stop offset="100%" stop-color="#1F9C8C"/>
    </linearGradient>
    <linearGradient id="hD" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#CFEFE7"/><stop offset="100%" stop-color="#6FD8C6"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="35%" r="60%">
      <stop offset="0%" stop-color="#B9F1E4" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#B9F1E4" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <circle cx="300" cy="260" r="260" fill="url(#glow)"/>

  <!-- large central crystal spire -->
  <g>
    <polygon points="300,60 360,150 300,210 240,150" fill="url(#hA)"/>
    <polygon points="300,60 360,150 400,130 330,45" fill="#CFEFE7"/>
    <polygon points="300,60 240,150 200,130 270,45" fill="#EAFBF6"/>
    <polygon points="240,150 300,210 250,340 175,270" fill="url(#hB)"/>
    <polygon points="360,150 300,210 350,340 425,270" fill="url(#hC)"/>
    <polygon points="250,340 300,210 350,340 300,470" fill="#0F5F55"/>
    <polygon points="175,270 250,340 300,470 235,430" fill="#0A2E2B"/>
    <polygon points="425,270 350,340 300,470 365,430" fill="#123F38"/>
    <polygon points="325,95 340,115 325,133 310,115" fill="#F0CB6B"/>
  </g>

  <!-- smaller secondary crystal, left -->
  <g transform="translate(60,330) scale(0.55)">
    <polygon points="300,60 360,150 300,210 240,150" fill="url(#hD)"/>
    <polygon points="240,150 300,210 250,340 175,270" fill="url(#hA)"/>
    <polygon points="360,150 300,210 350,340 425,270" fill="url(#hB)"/>
    <polygon points="250,340 300,210 350,340 300,470" fill="#0F5F55"/>
    <polygon points="175,270 250,340 300,470 235,430" fill="#0A2E2B"/>
    <polygon points="425,270 350,340 300,470 365,430" fill="#123F38"/>
  </g>

  <!-- smaller secondary crystal, right -->
  <g transform="translate(330,360) scale(0.42)">
    <polygon points="300,60 360,150 300,210 240,150" fill="url(#hD)"/>
    <polygon points="240,150 300,210 250,340 175,270" fill="url(#hA)"/>
    <polygon points="360,150 300,210 350,340 425,270" fill="url(#hB)"/>
    <polygon points="250,340 300,210 350,340 300,470" fill="#0F5F55"/>
    <polygon points="175,270 250,340 300,470 235,430" fill="#0A2E2B"/>
    <polygon points="425,270 350,340 300,470 365,430" fill="#123F38"/>
  </g>

  <!-- sparkle accents -->
  <g fill="#E8C25C">
    <polygon points="470,120 476,132 488,138 476,144 470,156 464,144 452,138 464,132"/>
    <polygon points="120,220 124,228 132,232 124,236 120,244 116,236 108,232 116,228"/>
  </g>
</svg>
